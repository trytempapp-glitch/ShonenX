name: Android CI & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'

      - name: Accept Android SDK licenses
        run: |
          yes | flutter doctor --android-licenses
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager --licenses
          fi

      - name: Install required Android SDK packages
        run: |
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager "platforms;android-36" "build-tools;36.0.0"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: debug-${{ github.run_id }}
          release_name: Debug Build ${{ github.run_number }}
          body: Automated debug Android build artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug APK to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive
